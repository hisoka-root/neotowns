name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -Pversion=${{ steps.version.outputs.VERSION }}
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            echo "Initial release" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s" "$PREVIOUS_TAG"..HEAD >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
      - name: Checksum and sign
        run: |
          JAR=$(ls build/libs/neotowns-*.jar 2>/dev/null | head -1)
          echo "Artifact: $JAR"
          sha256sum "$JAR" > "$JAR.sha256"
          gpg --detach-sign --armor "$JAR.sha256"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/neotowns-*.jar
            build/libs/neotowns-*.jar.sha256
            build/libs/neotowns-*.jar.sha256.asc
          generate_release_notes: false
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          name: NeoTowns ${{ steps.version.outputs.VERSION }}
